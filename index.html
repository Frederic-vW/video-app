<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Video Marking Rubric</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 2rem;
      max-width: 1100px;
      margin: auto;
    }

    h1, h2 {
      text-align: center;
    }

    input, button {
      padding: 0.5rem;
      font-size: 1rem;
    }

    button {
      cursor: pointer;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      margin-bottom: 2rem;
      display: none;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 0.5rem;
      text-align: center;
    }

    th {
      background: #eee;
    }

    .criterion {
      text-align: left;
    }

    .actions {
      text-align: center;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

<h1>YouTube Video Embedder</h1>

<div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
  <input id="videoIdInput" placeholder="YouTube video ID" style="flex:1;">
  <button onclick="embedVideo()">Embed</button>
</div>

<div class="video-container" id="videoContainer">
  <iframe id="youtubeIframe" allowfullscreen></iframe>
</div>

<hr>

<h2>Group Project Marking Rubric</h2>

<table id="rubricTable">
  <thead>
    <tr>
      <th>Criterion</th>
      <th>HD</th>
      <th>D</th>
      <th>C</th>
      <th>P</th>
      <th>F</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="actions">
  <button onclick="exportToExcel()">Export to Excel</button>
</div>

<script>
  const rubric = [
    { category: "Content", criterion: "Research quality", weight: 4 },
    { category: "Content", criterion: "Background & physiology", weight: 4 },
    { category: "Content", criterion: "Physiology related to condition", weight: 4 },
    { category: "Visuals", criterion: "Design & engagement", weight: 3 },
    { category: "Organisation", criterion: "Structure & clarity", weight: 2 },
    { category: "References", criterion: "Quality & referencing", weight: 1 }
  ];

  const grades = ["HD", "D", "C", "P", "F"];

  const gradeMap = {
    HD: 9.5,
    D: 8.0,
    C: 7.0,
    P: 6.0,
    F: 3.0
  };

  function embedVideo() {
    const id = videoIdInput.value.trim();
    if (!id) return alert("Enter a video ID.");
    youtubeIframe.src = `https://www.youtube.com/embed/${id}`;
    videoContainer.style.display = "block";
  }

  function renderRubric() {
    const tbody = document.querySelector("#rubricTable tbody");
    rubric.forEach((item, i) => {
      const row = document.createElement("tr");

      const critCell = document.createElement("td");
      critCell.className = "criterion";
      critCell.textContent = `${item.category}: ${item.criterion}`;
      row.appendChild(critCell);

      grades.forEach(g => {
        const td = document.createElement("td");
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `criterion_${i}`;
        input.value = g;
        td.appendChild(input);
        row.appendChild(td);
      });

      tbody.appendChild(row);
    });
  }

  function exportToExcel() {
    const rows = [];
    let total = 0;

    rubric.forEach((item, i) => {
      const selected = document.querySelector(`input[name="criterion_${i}"]:checked`);
      const grade = selected ? selected.value : "Not selected";
      const mark = gradeMap[grade] || 0;
      const weighted = mark * item.weight;
      total += weighted;

      rows.push({
        Category: item.category,
        Criterion: item.criterion,
        Grade: grade,
        Mark: mark,
        Weight: item.weight,
        WeightedScore: weighted
      });
    });

    rows.push({});
    rows.push({ Criterion: "TOTAL", WeightedScore: total });

    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Marks");

    XLSX.writeFile(wb, "Group_Project_Marking.xlsx");
  }

  renderRubric();
</script>

</body>
</html>
